#version: "3.9"

services:
  postgres:
    profiles: ["core"]
    image: postgres:17
    container_name: doc_hub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - dochub

  minio:
    profiles: ["core"]
    image: minio/minio:latest
    container_name: doc_hub_minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9090:9000"
      - "9091:9001"
    networks:
      - dochub

volumes:
  postgres_data:
  minio_data:

networks:
  dochub:
    driver: bridge