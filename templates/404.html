<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>404 — Не найдено</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% 10%, #2a2dff33, transparent),
                  radial-gradient(900px 600px at 80% 90%, #00d4ff22, transparent),
                  #0b1020;
      color: #e8eefc;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }
    .badge {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      font-size: 14px;
      color: #cfe0ff;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ff5c5c;
      box-shadow: 0 0 18px #ff5c5c88;
    }
    h1 {
      margin: 18px 0 8px;
      font-size: clamp(34px, 6vw, 56px);
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 18px;
      color: #b9c7e6;
      line-height: 1.5;
      font-size: 16px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    a.btn {
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: #e8eefc;
      font-weight: 600;
      transition: .15s ease;
    }
    a.btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.12); }
    a.btn.primary {
      background: linear-gradient(135deg, #2a5cff, #00d4ff);
      border-color: transparent;
      color: #061022;
      box-shadow: 0 10px 30px rgba(0,212,255,.18);
    }
    code {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 12px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.10);
      color: #d6e3ff;
    }
    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: #97a9cf;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge"><span class="dot"></span> 404 · Страница не найдена</div>
    <h1>Не туда свернули 🙂</h1>
    <p>Запрошенный ресурс не найден. Возможно, ссылка устарела или адрес набран с ошибкой.</p>
    <p><strong>URL:</strong> <code id="path"></code></p>

    <div class="actions">
      <a class="btn primary" href="/admin/">На главную</a>
      <a class="btn" href="javascript:history.back()">Назад</a>
    </div>

    <div class="hint">Если ты админ: проверь маршруты/прокси и настройку error_page 404.</div>
  </main>

  <script>
    document.getElementById("path").textContent = location.pathname;
  </script>
</body>
</html>
